apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secrets-manager-route
  namespace: {{ .Values.secretsManager.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.secretsManager.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.secretsManager.route }}
      backendRefs:
        - name: {{ .Values.secretsManager.name }}
          port: {{ .Values.secretsManager.port }}
