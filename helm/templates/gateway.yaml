apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: istio

  {{- if .Values.gateway.ipAddress }}
  addresses:
  - type: IPAddress
    value: {{ .Values.gateway.ipAddress | quote }}
  {{- end }}

  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
