apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: istio

  {{- if .Values.gateway.ipAddress.enable }}
  addresses:
  - type: IPAddress
    value: {{ .Values.gateway.ipAddress.value | quote }}
  {{- end }}

  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All

{{- if and .Values.gateway.https .Values.gateway.https.enable }}
 
  - name: https-root
    protocol: HTTPS
    port: 443
    hostname: {{ .Values.gateway.hostname | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ .Values.gateway.https.certificates.root }}
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All

  - name: https-grafana
    protocol: HTTPS
    port: 443
    hostname: {{ .Values.grafana.hostname | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ .Values.gateway.https.certificates.grafana }}
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All

  - name: https-keycloak
    protocol: HTTPS
    port: 443
    hostname: {{ .Values.keycloak.hostname | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ .Values.gateway.https.certificates.keycloak }}
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All

  - name: https-secrets
    protocol: HTTPS
    port: 443
    hostname: {{ .Values.secretsManager.hostname | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ .Values.gateway.https.certificates.secrets }}
        kind: Secret
    allowedRoutes:
      namespaces:
        from: All

  {{- end }}
