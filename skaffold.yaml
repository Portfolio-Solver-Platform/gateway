apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: gateway-skaffold

profiles:
  - name: dev
    activation:
      - command: dev
    deploy:
      helm:
        releases:
          - name: gateway
            chartPath: charts/nginx-gateway-fabric/
            namespace: nginx-gateway
            createNamespace: true
          - name: routes
            chartPath: ./charts/routes/
  - name: prod
    deploy:
      helm:
        releases:
          - name: gateway
            chartPath: charts/nginx-gateway-fabric/
            namespace: nginx-gateway
            createNamespace: true
          - name: routes
            chartPath: ./charts/routes/
            wait: true
            upgradeOnChange: true
